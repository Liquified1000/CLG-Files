<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CL G#mes Youtube</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto&display=swap');

        * {
            font-family: "Roboto", sans-serif;
        }

        center {
            display: block;
            text-align: -webkit-center;
        }

        .title {
            font-size: 60px;
        }

        body {
            background-color: #202020;
            color: darkgrey;
            -webkit-text-stroke: 0.01px lightgrey;
        }
        
        iframe {
            width: 800px;
            height: 450px;
            max-width: 100%;
        }
    </style>
</head>
<body>
<center>

    <h1 class="center">CL G#mes Youtube</h1>
    <div class="center">
        <h3>Insert YouTube Link:</h3>
        <input id="url" type="text" placeholder="https://youtube.com/watch?v=..." required style="padding: 5px; width: 300px;">
        <button id="submit" class="submit-button" style="padding: 6px 15px; cursor: pointer;">Watch</button>
    </div>
    <br>
    
    <div id="instructions" class="center">
        <hr style="width:100% !important">
        <h3>About</h3>
        <p>Use to get around blocks, and watch YouTube without ads and (mostly) tracker free! Just paste in the link and click Watch!</p>
        <h3>Not Working?</h3>
        <p>Make sure there isn't anything funky at the end of the link, just the video ID! Forked by CLG</p>
    </div>

    <div id="video-holder-holder">
        <div id="video-holder" class="center" style="display:none;">
            <hr>
            <iframe id="video" src="" frameborder="0" scrolling="no" allowfullscreen webkitallowfullscreen mozallowfullscreen></iframe>
        </div>
    </div>
    <hr class="space">

    <footer class="center">
        <br>
        <hr>
    </footer>

    <script>
        const base = "https://www.youtube-nocookie.com/embed/";
        const end = "?wmode=transparent&iv_load_policy=3&autoplay=0&html5=1&showinfo=0&rel=0&modestbranding=1&playsinline=0&theme=light";
        const strip_timestamps = /\?t=\d+/;
        
        var submit = document.getElementById('submit');
        var url = document.getElementById('url');
        var video_holder_holder = document.getElementById('video-holder-holder');
        
        submit.onclick = () => {
            // Remove instructions
            if(document.getElementById('instructions')) {
                document.getElementById('instructions').remove();
            }
            
            let link = url.value;
            // Clean the link to get just the ID
            let id = link.replace(strip_timestamps, "");
            id = id.substr(id.length - 11, 11);
            
            // Show the video player
            let video_holder = document.getElementById('video-holder').cloneNode(true);
            video_holder.style.display = 'block';
            video_holder.querySelector('iframe').src = base + id + end;
            
            // Clear old videos if they click watch again
            video_holder_holder.innerHTML = ''; 
            video_holder_holder.appendChild(video_holder);
        }
    </script>

</center>
</body>
</html>
