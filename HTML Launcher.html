<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLG PRO - HTML Launcher</title>
    <style>
        /* ==========================================
           GLOBAL VARIABLES & THEME
           ========================================== */
        :root {
            --primary-color: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.5);
            --danger-color: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.5);
            --bg-gradient: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e, #2e0854, #0f0c29);
            --transition-speed: 0.3s;
        }

        /* ==========================================
           ANIMATIONS
           ========================================== */
        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes dropSway {
            0% {
                transform: translate(-50%, -150%) scale(0.8) rotate(-5deg);
                opacity: 0;
            }

            60% {
                transform: translate(-50%, -40%) scale(1.02) rotate(2deg);
                opacity: 1;
            }

            80% {
                transform: translate(-50%, -55%) scale(0.98) rotate(-1deg);
            }

            100% {
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        @keyframes textPulse {

            0%,
            100% {
                text-shadow: 0 0 15px var(--primary-glow);
            }

            50% {
                text-shadow: 0 0 30px #a78bfa, 0 0 10px #ffffff;
            }
        }

        /* ==========================================
           BASE STYLES & INTERACTIVE BACKGROUND
           ========================================== */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            color: #ffffff;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Interactive Background Canvas */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.8;
        }

        /* ==========================================
           GLASSMORPHIC CONTAINER
           ========================================== */
        .launcher-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 900px;
            height: 85vh;
            background: rgba(15, 12, 41, 0.45);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 30px;
            animation: dropSway 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            box-sizing: border-box;
            z-index: 10;
            /* Keeps the glass above the interactive glow */
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 1px;
            animation: textPulse 4s infinite ease-in-out;
        }

        p {
            color: #a1a1aa;
            margin: 0;
            font-size: 1rem;
        }

        /* ==========================================
           CODE EDITOR (TEXTAREA)
           ========================================== */
        .editor-wrapper {
            flex-grow: 1;
            position: relative;
            margin-bottom: 25px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 5px 20px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            transition: all var(--transition-speed);
        }

        .editor-wrapper:focus-within {
            border-color: var(--primary-color);
            box-shadow: inset 0 5px 20px rgba(0, 0, 0, 0.5), 0 0 20px var(--primary-glow);
        }

        textarea {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: #e2e8f0;
            padding: 20px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 15px;
            line-height: 1.5;
            resize: none;
            outline: none;
            box-sizing: border-box;
        }

        textarea::-webkit-scrollbar {
            width: 10px;
        }

        textarea::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        textarea::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }

        textarea::-webkit-scrollbar-thumb:hover {
            background: var(--primary-color);
        }

        /* ==========================================
           BUTTONS
           ========================================== */
        .controls {
            display: flex;
            gap: 15px;
        }

        button {
            flex: 1;
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            color: white;
            cursor: pointer;
            transition: all var(--transition-speed);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:active {
            transform: scale(0.92) !important;
            transition: transform 0.1s cubic-bezier(0.25, 1, 0.5, 1);
            filter: brightness(1.3);
        }

        .btn-launch {
            background: var(--primary-color);
            box-shadow: 0 8px 25px var(--primary-glow);
        }

        .btn-launch:hover {
            background: #a78bfa;
            transform: translateY(-3px);
            box-shadow: 0 12px 30px var(--primary-glow);
        }

        .btn-stealth {
            background: var(--danger-color);
            box-shadow: 0 8px 25px var(--danger-glow);
        }

        .btn-stealth:hover {
            background: #f87171;
            transform: translateY(-3px);
            box-shadow: 0 12px 30px var(--danger-glow);
        }

        .btn-clear {
            flex: 0.3;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: none;
            color: #a1a1aa;
        }

        .btn-clear:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            transform: translateY(-3px);
        }

        button svg {
            width: 18px;
            height: 18px;
        }
    </style>
</head>

<body>

    <canvas id="bg-canvas"></canvas>

    <div class="launcher-modal">
        <div class="header">
            <h1>HTML LAUNCHER</h1>
            <p>Inject and execute raw HTML, CSS, and JavaScript in an isolated environment.</p>
        </div>

        <div class="editor-wrapper">
            <textarea id="html-input" spellcheck="false"
                placeholder="&#10;<!DOCTYPE html>&#10;<html>&#10;  <head>&#10;    <style>&#10;      body { background: #111; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }&#10;    </style>&#10;  </head>&#10;  <body>&#10;    <h1>System Online.</h1>&#10;  </body>&#10;</html>"></textarea>
        </div>

        <div class="controls">
            <button id="btn-clear" class="btn-clear" title="Clear Editor">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
            </button>
            <button id="btn-launch-normal" class="btn-launch">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M18 13v6a2 2 0 0 1-2-2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                    <polyline points="15 3 21 3 21 9"></polyline>
                    <line x1="10" y1="14" x2="21" y2="3"></line>
                </svg>
                Launch Tab
            </button>
            <button id="btn-launch-stealth" class="btn-stealth">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
                about:blank
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnLaunchNormal = document.getElementById('btn-launch-normal');
            const btnLaunchStealth = document.getElementById('btn-launch-stealth');
            const btnClear = document.getElementById('btn-clear');
            const htmlInput = document.getElementById('html-input');
            // Advanced Particle Network Physics
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            let mouse = { x: -1000, y: -1000 };
            let targetMouse = { x: -1000, y: -1000 };
            let particles = [];

            function initParticles() {
                particles = [];
                // Dynamic particle count based on screen size for performance
                const numParticles = Math.floor((canvas.width * canvas.height) / 12000);
                for (let i = 0; i < numParticles; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.7,
                        vy: (Math.random() - 0.5) * 0.7,
                        baseRadius: Math.random() * 1.5 + 0.8
                    });
                }
            }

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                initParticles();
            }
            window.addEventListener('resize', resize);
            resize();

            window.addEventListener('mousemove', (e) => {
                targetMouse.x = e.clientX;
                targetMouse.y = e.clientY;
            });
            
            // Fade out effect when mouse leaves window
            window.addEventListener('mouseout', () => {
                targetMouse.x = -1000;
                targetMouse.y = -1000;
            });

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Extrapolated lerp for a highly satisfying "lag" behind the cursor
                mouse.x += (targetMouse.x - mouse.x) * 0.05;
                mouse.y += (targetMouse.y - mouse.y) * 0.05;

                for (let i = 0; i < particles.length; i++) {
                    let p = particles[i];

                    // Drift physics
                    p.x += p.vx;
                    p.y += p.vy;

                    // Bounce off walls smoothly
                    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

                    // Mouse interaction
                    let dx = mouse.x - p.x;
                    let dy = mouse.y - p.y;
                    let distToMouse = Math.sqrt(dx * dx + dy * dy);
                    let radius = p.baseRadius;
                    let opacity = 0.15;

                    if (distToMouse < 220) {
                        const intensity = 1 - (distToMouse / 220);
                        radius += intensity * 3;
                        opacity += intensity * 0.7;
                        
                        // Mild repulsion bounce from cursor
                        p.x -= dx * 0.015 * intensity;
                        p.y -= dy * 0.015 * intensity;
                    }

                    // Network Connections (Draw lines between close dots)
                    for (let j = i + 1; j < particles.length; j++) {
                        let p2 = particles[j];
                        let dx2 = p.x - p2.x;
                        let dy2 = p.y - p2.y;
                        let distToP2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);

                        if (distToP2 < 100) {
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(p2.x, p2.y);
                            
                            let lineOpacity = (1 - distToP2 / 100) * 0.1;
                            // Intensify line glow near the mouse cursor
                            if (distToMouse < 220) {
                                lineOpacity += (1 - distToMouse / 220) * 0.25;
                            }
                            ctx.strokeStyle = `rgba(167, 139, 250, ${lineOpacity})`;
                            ctx.lineWidth = 1;
                            ctx.stroke();
                        }
                    }   

                    // Render Dot
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(167, 139, 250, ${opacity})`;
                    ctx.fill();
                }
                requestAnimationFrame(draw);
            }
            draw();

            // 1. Normal Launch (Blob URL)
            btnLaunchNormal.addEventListener('click', () => {
                const code = htmlInput.value;
                if (!code.trim()) return alert('Please paste some code first!');

                const blob = new Blob([code], { type: 'text/html' });
                const blobUrl = URL.createObjectURL(blob);
                window.open(blobUrl, '_blank');
            });

            // 2. Stealth Launch (about:blank injection)
            btnLaunchStealth.addEventListener('click', () => {
                const code = htmlInput.value;
                if (!code.trim()) return alert('Please paste some code first!');

                const win = window.open('about:blank', '_blank');
                if (win) {
                    win.document.open();
                    win.document.write(code);
                    win.document.close();
                } else {
                    alert('Popup blocked! Please allow popups to use the stealth launcher.');
                }
            });

            // 3. Clear Editor
            btnClear.addEventListener('click', () => {
                if (htmlInput.value.trim() === '' || confirm('Clear the editor?')) {
                    htmlInput.value = '';
                    htmlInput.focus();
                }
            });
        });
    </script>
</body>

</html>
